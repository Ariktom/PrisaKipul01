(function setupReportButtonLockObserver(){
  function start() {
    try {
      refreshTeamReportButton();

      var lamp = document.getElementById('toolbar-lamp');
      if (lamp && window.MutationObserver) {
        var observer = new MutationObserver(function(){ refreshTeamReportButton(); });
        observer.observe(lamp, { attributes: true, attributeFilter: ['class'] });
      }

      document.addEventListener('click', function(e) {
        if (e.target && (e.target.classList.contains('team-btn') || e.target.id === 'btn-team' || e.target.id === 'btn-team-list')) {
          setTimeout(refreshTeamReportButton, 50);
        }
      });

      
    } catch(e) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();









function getCurrentMissionKeyForReport() {
  try {
    if (typeof currentChecklist !== 'undefined' && currentChecklist) return currentChecklist;
    if (typeof currentChecklistKey !== 'undefined' && currentChecklistKey) return currentChecklistKey;
    if (typeof currentMission !== 'undefined' && currentMission) return currentMission;
    if (typeof activeChecklist !== 'undefined' && activeChecklist) return activeChecklist;
    if (typeof selectedChecklist !== 'undefined' && selectedChecklist) return selectedChecklist;
  } catch(e) {}
  return null;
}

function reportProgressTextIsComplete(txt) {
  txt = String(txt || '').trim();
  var m = txt.match(/(\d+)\s*\/\s*(\d+)/);
  if (!m) return false;
  var done = parseInt(m[1], 10);
  var total = parseInt(m[2], 10);
  return total > 0 && done >= total;
}

function isMissionCompleteForReportButton() {
  var toolbarStatus = document.getElementById('toolbar-status');
  if (toolbarStatus && reportProgressTextIsComplete(toolbarStatus.textContent)) return true;

  var key = getCurrentMissionKeyForReport();
  if (key) {
    var tileStatus = document.getElementById('status-' + key);
    if (tileStatus && reportProgressTextIsComplete(tileStatus.textContent)) return true;

    var dot = document.getElementById('dot-' + key);
    if (dot && dot.classList && dot.classList.contains('dot-done-green')) return true;
  }

  var lamp = document.getElementById('toolbar-lamp');
  if (lamp && lamp.classList && lamp.classList.contains('done')) return true;

  var content = document.getElementById('checklist-content');
  if (content) {
    var boxes = Array.prototype.slice.call(content.querySelectorAll('input[type="checkbox"].task-checkbox'));
    var operational = boxes.filter(function(cb) {
      var row = cb.closest('.task-row');
      return row && !row.classList.contains('captain-row');
    });
    if (operational.length > 0 && operational.every(function(cb){ return cb.checked; })) return true;
  }

  return false;
}

function refreshTeamReportButton() {
  var btn = document.getElementById('team-report-btn') || document.querySelector('.team-report-btn');
  if (!btn) return;

  var ready = isMissionCompleteForReportButton();
  btn.disabled = !ready;

  if (ready) {
    btn.classList.add('report-active');
    btn.title = '';
  } else {
    btn.classList.remove('report-active');
    btn.title = 'הפקת דו"ח אפשרית רק לאחר השלמת המשימה';
  }
}

(function setupReportButtonCompletionWatcher(){
  function start() {
    try {
      refreshTeamReportButton();

      document.addEventListener('click', function(){ setTimeout(refreshTeamReportButton, 120); }, true);
      document.addEventListener('change', function(){ setTimeout(refreshTeamReportButton, 120); }, true);
      document.addEventListener('input', function(){ setTimeout(refreshTeamReportButton, 120); }, true);

      if (window.MutationObserver) {
        var observer = new MutationObserver(function(){ setTimeout(refreshTeamReportButton, 100); });
        observer.observe(document.body, {
          childList: true,
          subtree: true,
          attributes: true,
          characterData: true,
          attributeFilter: ['class', 'style', 'checked']
        });
      }

      setInterval(refreshTeamReportButton, 300);
    } catch(e) {}
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();

    const gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.value = 880; // tone

    gain.gain.value = 0.2;

    osc.connect(gain);

    }, 120);

  function formatClock(ms) {
    ms = Math.max(0, Number(ms) || 0);
    const totalSeconds = Math.floor(ms / 1000);
    const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
    const sec = String(totalSeconds % 60).padStart(2, '0');
    return h + ':' + m + ':' + sec;
  }

  function getCurrentClockElapsed() {
    let elapsed = Number(clockElapsedMs) || 0;
    if (clockRunning && clockStartedAt) {
      elapsed += Date.now() - Number(clockStartedAt);
    }
    return Math.max(0, elapsed);
  }

  function getElapsedFromClockData(data) {
    if (!data) return 0;
    let elapsed = Number(data.clockElapsedMs) || 0;
    if (data.clockRunning && data.clockStartedAt) {
      elapsed += Date.now() - Number(data.clockStartedAt);
    }
    return Math.max(0, elapsed);
  }

  function ensureTileClockElement(taskId) {
    let el = document.getElementById('tile-clock-' + taskId);
    if (el) return el;

    const dot = document.getElementById('dot-' + taskId);
    const tile = dot ? dot.closest('.tile') : null;
    if (!tile) return null;

    el = document.createElement('div');
    el.id = 'tile-clock-' + taskId;
    el.className = 'tile-clock-label hidden';
    el.textContent = '00:00:00';
    tile.appendChild(el);
    return el;
  }

  function updateTileClockDisplays() {
    Object.keys(checklistProgress || {}).forEach(id => {
      const el = ensureTileClockElement(id);
      if (!el) return;

      const data = tileClockState[id];
      const visible = !!(data && (data.clockEverStarted || data.clockRunning || Number(data.clockElapsedMs) > 0));

      if (!visible) {
        el.classList.add('hidden');
        el.textContent = '00:00:00';
        return;
      }

      el.textContent = formatClock(getElapsedFromClockData(data));
      el.classList.remove('hidden');
    });
  }

  function updateClockDisplay() {
    if (missionClock) missionClock.textContent = formatClock(getCurrentClockElapsed());
    updateTileClockDisplays();

    if (clockToggleBtn) {
      if (clockRunning) {
        clockToggleBtn.textContent = 'STOP';
        clockToggleBtn.classList.remove('start');
        clockToggleBtn.classList.add('stop');
      } else {
        clockToggleBtn.textContent = 'START';
        clockToggleBtn.classList.remove('stop');
        clockToggleBtn.classList.add('start');
      }
    }
  }

  function updateClockControlsAccess() {
    const canControlClock = isCommander();
    if (clockToggleBtn) {
      clockToggleBtn.style.display = canControlClock ? 'inline-flex' : 'none';
      clockToggleBtn.style.alignItems = 'center';
      clockToggleBtn.style.justifyContent = 'center';
    }
    if (clockResetBtn) {
      clockResetBtn.style.display = canControlClock ? 'flex' : 'none';
    }
  }

  function ensureClockTicker() {
    if (clockTickTimer) return;
    clockTickTimer = setInterval(updateClockDisplay, 250);
  }

  function setClockFromSession(data) {
    clockElapsedMs = Number(data && data.clockElapsedMs) || 0;
    clockRunning = !!(data && data.clockRunning);
    clockStartedAt = data && data.clockStartedAt ? Number(data.clockStartedAt) : null;
    updateClockDisplay();
    updateClockControlsAccess();
    ensureClockTicker();
  }

  function startClock() {
    if (!currentId || clockRunning || !isCommander()) return;

    if (!commanderMap[currentId] && !isActiveMap[currentId]) {
      dbSet(sessionPath(currentId), {
        commander: null,
        active: true,
        assignSize: currentAssignSize || 6,
        assignSelected: !!teamSizeSelected,
        teamNames: teamNames || {},
        roles: stepAssignments || [],
        checks: stepChecks || [],
        users: getSessionUsers(),
        clockElapsedMs: getCurrentClockElapsed(),
        clockRunning: true,
        clockStartedAt: Date.now(),
        clockEverStarted: true
      });
      return;
    }

    dbUpdate(sessionPath(currentId), {
      active: isActiveMap[currentId] === 'done' ? 'done' : true,
      clockElapsedMs: getCurrentClockElapsed(),
      clockRunning: true,
      clockStartedAt: Date.now(),
      clockEverStarted: true
    });
  }

  function stopClock() {
    if (!currentId || !clockRunning || !isCommander()) return;
    dbUpdate(sessionPath(currentId), {
      clockElapsedMs: getCurrentClockElapsed(),
      clockRunning: false,
      clockStartedAt: null
    });
  }

  function resetClock(taskId) {
    if (!taskId) return;
    dbUpdate(sessionPath(taskId), {
      clockElapsedMs: 0,
      clockRunning: false,
      clockStartedAt: null,
      clockEverStarted: false
    });

    if (taskId === currentId) {
      clockElapsedMs = 0;
      clockRunning = false;
      clockStartedAt = null;
      updateClockDisplay();
    }
  }

  function startSession(taskId, commanderId) {
    if (!currentAssignSize) currentAssignSize = 6;

    const payload = {
      commander: commanderId || null,
      active: true,
      assignSize: currentAssignSize,
      assignSelected: !!teamSizeSelected,
      teamNames: teamNames || {},
      roles: stepAssignments || [],
      checks: stepChecks || [],
      owners: [],
      users: getSessionUsers(),
      clockElapsedMs: 0,
      clockRunning: false,
      clockStartedAt: null,
      clockEverStarted: false
    };

    dbSet(sessionPath(taskId), payload);
  }

  function updateCheck(taskId, index, value) {
    const updates = {};
    updates['checks/' + index] = value;
    if (value) {
      updates['owners/' + index] = userId;
    } else {
      updates['owners/' + index] = null;
    }
    dbUpdate(sessionPath(taskId), updates);
  }

  function updateAssignments(taskId) {
    dbUpdate(sessionPath(taskId), {
      roles: stepAssignments || [],
      checks: stepChecks || []

  function resetSession(taskId) {
    dbRemove(sessionPath(taskId));

  function resetAllSessions() {
    // STEP 1: USER reset-all behavior.
    // Remove each mission under /sessions, exactly like RESET MISSION does for one mission.
    // Do NOT touch config/logoutVersion, so nobody is kicked back to the PIN screen.
    const ids = Object.keys(checklists);
    return Promise.all(ids.map(id => dbRemove(sessionPath(id)))).then(() => {
      Object.keys(checklistProgress).forEach(id => {
        checklistProgress[id] = [];
        isActiveMap[id] = false;
      });
      commanderMap = {};
      userRoles.clear();
      rolesSelected = false;
      currentAssignSize = null;
      teamSizeSelected = false;
      teamNames = {};
      window.sessionUsers = {};
      tileClockState = {};
      clockElapsedMs = 0;
      clockRunning = false;
      clockStartedAt = null;
      updateClockDisplay();
    });
  }


  function adminKillAllToPin() {
    if (!isAdminUser) return;

    const crown = document.getElementById('btn-admin-kill');
    if (crown) crown.disabled = true;

    resetAllSessions()
      .then(() => getLogoutVersion())
      .then(version => dbSet(appPath('config/logoutVersion'), Number(version || 1) + 1))
      .catch(error => {
        console.error('ADMIN KILL SWITCH failed:', error);
      })
      .finally(() => {
        if (crown) crown.disabled = false;
      });
  }

  function listenToAllSessions(callback) {
    const ref = dbRef(appPath('sessions'));
    ref.on('value', snapshot => {
      callback(snapshot.val() || {});
    });
  }

  function listenToSession(taskId, callback) {
    const ref = dbRef(sessionPath(taskId));
    ref.on('value', snapshot => {
      callback(snapshot.val() || null);
    });
    return ref;
  }

  const checklistProgress = {
    "antenna-deploy": [],
    "antenna-tear": [],
    "rcs-deploy": [],
    "rcs-tear": [],
    "rps-deploy": [],
    "rps-tear": [],
    "cooling-deploy": [],
    "cooling-tear": []
  };

  function updateTiles(sessions) {
    const allIds = Object.keys(checklistProgress);

    allIds.forEach(id => {
      const s = sessions[id];
      if (!s) {
        isActiveMap[id] = false;
        checklistProgress[id] = [];
        delete tileClockState[id];
        return;
      }

      if (s.active === "done") {
        isActiveMap[id] = "done";
      } else if (s.active) {
        isActiveMap[id] = "active";
      } else {
        isActiveMap[id] = false;
      }

      tileClockState[id] = {
        clockElapsedMs: Number(s.clockElapsedMs) || 0,
        clockRunning: !!s.clockRunning,
        clockStartedAt: s.clockStartedAt ? Number(s.clockStartedAt) : null,
        clockEverStarted: !!s.clockEverStarted
      };

      const arr = [];
      if (s.checks) {
        Object.keys(s.checks).forEach(k => {
          arr[Number(k)] = !!s.checks[k];
        });
      }
      checklistProgress[id] = arr;
    });

    updateIndicators();
    updateTileClockDisplays();
  }

  let protectedAppStarted = false;

  function startProtectedApp() {
    if (protectedAppStarted) return;
    protectedAppStarted = true;
    beginLogoutVersionListener();
    listenToAllSessions(sessions => {
      updateTiles(sessions);
    });
  }

  function showPinLock(message) {
    const lock = document.getElementById('pin-lock');
    const err = document.getElementById('pin-error');
    if (lock) lock.style.display = 'flex';
    if (err) err.textContent = message || '';
  }

  function hidePinLock() {
    const lock = document.getElementById('pin-lock');
    if (lock) lock.style.display = 'none';
  }

  function updateResetAllVisibility() {
    const btn = document.getElementById('btn-shutdown-all');
    const crown = document.getElementById('btn-admin-kill');

    // RESET ALL is visible to every logged-in user.
    // It resets all missions only. It does NOT kick anyone to the PIN screen.
    if (btn) btn.style.display = userId ? 'inline-block' : 'none';

    // Crown is visible ONLY after verified admin Firebase /config write permission.
    if (crown) crown.style.display = (userId && isAdminUser) ? 'flex' : 'none';
  }

  function setPinBusy(isBusy) {
    const btn = document.getElementById('pin-submit');
    const input = document.getElementById('pin-input');
    if (btn) {
      btn.disabled = !!isBusy;
      btn.textContent = isBusy ? 'בודק...' : 'כניסה';
    }
    if (input) input.disabled = !!isBusy;
  }

  function verifyPinAccess() {
    return dbRef(appPath('sessions')).once('value');
  }

  function getLogoutVersion() {
    return dbRef(appPath('config/logoutVersion')).once('value').then(snap => snap.val() || 1);
  }


  function verifyAdminKillAccess() {
    // Real admin test: only admin rules should allow writing under /config.
    // We write the SAME logoutVersion value, so nobody is kicked during login.
    return getLogoutVersion()
      .then(version => dbSet(appPath('config/logoutVersion'), Number(version || 1)).then(() => true))
      .catch(() => false);
  }

  function writeUserAccess(pin, loginVersion, asAdmin) {
    return dbSet(appPath('users/' + userId), {
      pin: pin,
      isAdmin: !!asAdmin,
      loginVersion: loginVersion,
      lastLoginAt: firebase.database.ServerValue.TIMESTAMP
    });
  }

  function savePinWithRole(pin, loginVersion) {
    // Try admin first. Firebase Rules accept this only if the PIN equals config/adminPin.
    return writeUserAccess(pin, loginVersion, true)
      .then(() => true)
      .catch(() => {
        // If admin write failed, try normal user. Firebase Rules accept this only if the PIN equals config/pin.
        return writeUserAccess(pin, loginVersion, false).then(() => false);
      });
  }

  function forceLogoutToPin(message) {
    if (forceLogoutInProgress) return;
    forceLogoutInProgress = true;

    const uid = userId;
    const finish = () => {
      userId = null;
      isAdminUser = false;
      updateResetAllVisibility();
      currentLoginVersion = null;
      protectedAppStarted = false;
      const input = document.getElementById('pin-input');
      if (input) input.value = '';
      showPinLock(message || 'הגישה אופסה. יש להזין קוד מחדש.');
      setTimeout(() => window.location.reload(), 350);
    };

    const cleanup = uid ? dbRemove(appPath('users/' + uid)).catch(() => {}) : Promise.resolve();
    cleanup
      .then(() => auth.signOut().catch(() => {}))
      .then(finish)
      .catch(finish);
  }

  function beginLogoutVersionListener() {
    if (logoutVersionRef) logoutVersionRef.off();
    logoutVersionRef = dbRef(appPath('config/logoutVersion'));
    logoutVersionRef.on('value', snap => {
      const latest = snap.val() || 1;
      if (currentLoginVersion !== null && latest !== currentLoginVersion) {
        forceLogoutToPin('הגישה אופסה על ידי מנהל. יש להזין קוד מחדש.');
      }
    });
  }

  function submitPinLogin() {
    const input = document.getElementById('pin-input');
    const err = document.getElementById('pin-error');
    const pin = input ? input.value.trim() : '';

    if (!pin) {
      if (err) err.textContent = 'יש להזין קוד.';
      return;
    }

    setPinBusy(true);
    if (err) err.textContent = '';

    const signInPromise = auth.currentUser ? Promise.resolve({ user: auth.currentUser }) : auth.signInAnonymously();

    signInPromise
      .then(result => {
        const user = result.user || auth.currentUser;
        if (!user) throw new Error('לא ניתן להתחבר ל-Firebase Auth.');
        userId = user.uid;
        return getLogoutVersion();
      })
      .then(version => {
        currentLoginVersion = version;
        return savePinWithRole(pin, version);
      })
      .then(() => verifyAdminKillAccess())
      .then(hasAdminKillAccess => {
        isAdminUser = !!hasAdminKillAccess;
        updateResetAllVisibility();
        return verifyPinAccess();
      })
      .then(() => {
        hidePinLock();
        startProtectedApp();
        if (currentId) updateClockControlsAccess();
      })
      .catch(error => {
        console.error('PIN login failed:', error);
        isAdminUser = false;
        updateResetAllVisibility();
        showPinLock('קוד שגוי או שאין הרשאה למסד הנתונים.');
      })
      .finally(() => setPinBusy(false));
  }

  function initPinProtection() {
    showPinLock('');

    const btn = document.getElementById('pin-submit');
    const input = document.getElementById('pin-input');

    if (btn) btn.addEventListener('click', submitPinLogin);
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitPinLogin();
      });
      setTimeout(() => input.focus(), 100);
    }

    auth.onAuthStateChanged(user => {
      if (!user) {
        userId = null;
        isAdminUser = false;
        updateResetAllVisibility();
        currentLoginVersion = null;
        showPinLock('');
        return;
      }
      userId = user.uid;

      Promise.all([
        dbRef(appPath('users/' + userId)).once('value'),
        getLogoutVersion()
      ])
        .then(([userSnap, version]) => {
          const data = userSnap.val() || {};
          currentLoginVersion = data.loginVersion || null;
          isAdminUser = false;
          updateResetAllVisibility();
          if (!currentLoginVersion || currentLoginVersion !== version) {
            throw new Error('Saved login is no longer valid.');
          }
          return verifyPinAccess();
        })
        .then(() => verifyAdminKillAccess())
        .then(hasAdminKillAccess => {
          isAdminUser = !!hasAdminKillAccess;
          updateResetAllVisibility();
          hidePinLock();
          startProtectedApp();
        })
        .catch(() => {
          isAdminUser = false;
          updateResetAllVisibility();
          showPinLock('');
        });
    });
  }

  function openChecklist(id, colorKey) {
    currentId = id;
    currentColorKey = colorKey;

    const cl = checklists[id];
    if (!cl) {
      alert("לא נמצא צ'קליסט עבור " + id);
      return;
    }

    toolbarTitle.textContent = "";

    if (!currentAssignSize) {
      currentAssignSize = 6;
    }

    userRoles = new Set();
    rolesSelected = false;

    if (currentSessionRef) {
      currentSessionRef.off();
      currentSessionRef = null;
    }

    currentSessionRef = listenToSession(id, data => {
if (data) {
  commanderMap[id] = data.commander || null;
  // Normalize Firebase active state so toolbar lamp keeps blinking after Back + reopen
  // Firebase stores active as true while running, and "done" when completed.
  if (data.active === "done") {
    isActiveMap[id] = "done";
  } else if (data.active) {
    isActiveMap[id] = "active";
  } else {
    isActiveMap[id] = false;
  }

  stepAssignments = data.roles || [];

  const newChecks = data.checks || [];
stepOwners = data.owners || [];
  // 🔊 commander beep when a step becomes checked
  if (isCommander() && prevStepChecks.length > 0) {
    for (let i = 0; i < newChecks.length; i++) {
      if (!prevStepChecks[i] && newChecks[i]) {
        playCommanderBeep();
        break;
      }
    }
  }

  // save for next comparison
  prevStepChecks = [...newChecks];
  stepChecks = newChecks;

  currentAssignSize = data.assignSize || 6;
  teamSizeSelected = !!data.assignSelected;
  teamNames = data.teamNames || {};

  window.sessionUsers = data.users || {};
  setClockFromSession(data);

        if (isCommander()) {
          userRoles = new Set();
          rolesSelected = false;
        } else {
          const me = window.sessionUsers[userId] || {};
          userRoles = new Set(me.roles || []);
          rolesSelected = userRoles.size > 0;
        }
      } else {
        commanderMap[id] = null;
        isActiveMap[id] = false;
        stepAssignments = [];
        stepChecks = [];
        currentAssignSize = 6;
        teamSizeSelected = false;
        teamNames = {};
        window.sessionUsers = {};
        userRoles = new Set();
        rolesSelected = false;
        setClockFromSession(null);
      }

      checklistProgress[id] = [...stepChecks];
      renderChecklist();
      renderRoleBanner();
      updateCommanderButton();
      updateIndicators();
      closeCollapsibleForSoldiersWhenCommanderExists();
    });

    screenHome.classList.remove('active');
    screenChecklist.classList.add('active');

    setTimeout(() => {
      closeCollapsibleForSoldiersWhenCommanderExists();
    }, 50);

    updateCommanderButton();
    buildAssignButtonsToolbar();
    updateIndicators();
  }

  function goHome() {
    screenChecklist.classList.remove('active');
    screenHome.classList.add('active');
  }

  function toggleCollapsible() {
    const body = document.getElementById('collapsible-body');
    const header = document.querySelector('.collapsible-header');

    if (currentId && commanderMap[currentId] && !isCommander()) {
      closeCollapsibleForSoldiersWhenCommanderExists();
      return;
    }

    const isClosed = body.style.display === 'none';
    body.style.display = isClosed ? 'block' : 'none';

    if (isClosed) header.classList.add('open');
    else header.classList.remove('open');
  }

function renderRoleBanner() {
  updateTeamButtonState();
  if (!currentAssignSize) return;

  roleBanner.style.display = 'flex';
  roleBanner.innerHTML = '';

  const letters = ['A','B','C','D','E','F','G','H'];
  const users = Object.values(getSessionUsers());
  const commanderView = isCommander();

  for (let i = 0; i < currentAssignSize; i++) {
    const L = letters[i];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = L;

    const takenBySomeone = users.some(u => (u.roles || []).includes(L));

    if (commanderView) {
      if (takenBySomeone) {
        btn.style.background = 'yellow';
        btn.style.color = 'black';
        btn.style.border = '2px solid #000';
      }

      // do NOT disable, only block click
      btn.style.opacity = '1';
      btn.style.cursor = 'default';
      btn.onclick = (e) => {
        e.preventDefault();
      };
    } else {
      if (userRoles.has(L)) {
        btn.classList.add('active');
      }

      btn.onclick = () => {
        if (userRoles.has(L)) userRoles.delete(L);
        else userRoles.add(L);

        rolesSelected = userRoles.size > 0;

        renderRoleBanner();
        renderChecklist();

        dbUpdate(sessionPath(currentId) + '/users/' + userId, {
          roles: Array.from(userRoles)
        });
      };
    }

    roleBanner.appendChild(btn);
  }
}

  const activeBtn = document.querySelector(`#assign-extra .assign-btn[onclick="applyAssign(${size})"]`);

  stepChecks = [];

      stepAssignments.push(arr[idxStep] || '');

    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');

  function checkIfChecklistDone() {
    const cl = checklists[currentId];
    if (!cl) return;

    const steps = cl.steps;
    let anyStep = false;
    let allChecked = true;

    steps.forEach((step, idx) => {
      if (step.type === 'step') {
        anyStep = true;
        if (!stepChecks[idx]) allChecked = false;
      }
    });

    if (anyStep && allChecked) {
      isActiveMap[currentId] = "done";
      dbUpdate(sessionPath(currentId), {
        active: "done",
        clockElapsedMs: getCurrentClockElapsed(),
        clockRunning: false,
        clockStartedAt: null
      });
    } else if (commanderMap[currentId]) {
      isActiveMap[currentId] = "active";
      dbUpdate(sessionPath(currentId), { active: true });
    } else {
      isActiveMap[currentId] = false;
    }
  }

  function scrollToNextStep(currentIdx) {
    const cl = checklists[currentId];
    if (!cl) return;

    const steps = cl.steps;
    let nextIndex = -1;
    for (let i = currentIdx + 1; i < steps.length; i++) {
      if (steps[i].type === 'step') {
        nextIndex = i;
        break;
      }
    }
    if (nextIndex === -1) return;

    const rows = checklistContent.querySelectorAll('.task-row');
    let stepCounter = 0;
    let targetRow = null;
    for (let i = 0; i < steps.length; i++) {
      if (steps[i].type === 'step') {
        if (i === nextIndex) {
          targetRow = rows[stepCounter];
          break;
        }
        stepCounter++;
      }
    }
    if (!targetRow) return;

    const toolbarRect = toolbar.getBoundingClientRect();
    const contentRect = checklistContent.getBoundingClientRect();
    const rowRect = targetRow.getBoundingClientRect();

    const offset = rowRect.top - contentRect.top;
    const newScroll = checklistContent.scrollTop + offset - (toolbarRect.height + 8);

    checklistContent.scrollTo({
      top: newScroll < 0 ? 0 : newScroll,
      behavior: 'smooth'
    });
  }
function getStepStageMap(steps) {
  const stageMap = [];
  let currentStage = 0;

  steps.forEach((step, idx) => {
    if (step.type === 'separator') {
      currentStage++;
      stageMap[idx] = null;
    } else if (step.type === 'step') {
      stageMap[idx] = currentStage;
    } else {
      stageMap[idx] = null; // captain rows do not count
    }
  });

  return stageMap;
}

function isStageComplete(targetStage, steps, stageMap, checks) {
  for (let i = 0; i < steps.length; i++) {
    if (steps[i].type === 'step' && stageMap[i] === targetStage) {
      if (!checks[i]) return false;
    }
  }
  return true;
}

function isStepUnlocked(stepIndex, steps, checks) {
  if (!steps[stepIndex] || steps[stepIndex].type !== 'step') return false;

  // Section-gated flow:
  // A step is enabled only when all operational steps in the section
  // immediately before the previous separator are checked.
  // Steps inside the same section are enabled together.
  let previousSeparator = -1;
  for (let i = stepIndex - 1; i >= 0; i--) {
    if (steps[i].type === 'separator') {
      previousSeparator = i;
      break;
    }
  }

  // First section: no separator before it, so it is open.
  if (previousSeparator === -1) return true;

  let separatorBeforePrevious = -1;
  for (let i = previousSeparator - 1; i >= 0; i--) {
    if (steps[i].type === 'separator') {
      separatorBeforePrevious = i;
      break;
    }
  }

  for (let i = separatorBeforePrevious + 1; i < previousSeparator; i++) {
    if (steps[i].type === 'step' && !checks[i]) {
      return false;
    }
  }

  return true;
}

    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.top = 0;
    overlay.style.left = 0;
    overlay.style.width = '100vw';
    overlay.style.height = '100vh';
    overlay.style.background = 'rgba(0,0,0,0.6)';

    box.style.color = '#000';

    let counter = 1;
    cl.steps.forEach(step => {
      if (step.type === 'step') {

        line.style.margin = '10px 0';
        line.style.color = '#000';
        line.style.direction = 'rtl';
        line.style.display = 'flex';

        num.style.marginLeft = '8px';
        num.style.direction = 'ltr';
        num.style.unicodeBidi = 'isolate';

        txt.style.direction = 'rtl';
        txt.style.textAlign = 'right';

        const sep = document.createElement('div');
        sep.style.borderBottom = '3px solid #000';
        sep.style.margin = '15px 0';
        box.appendChild(sep);
      }
    });

    overlay.appendChild(box);
    document.body.appendChild(overlay);
  }

<script>
  window.addEventListener("load", () => {
    initPinProtection();
    document.getElementById('btn-paper-list').onclick = () => openPaperList();
    document.getElementById('btn-user-guide').onclick = () => openUserGuide();

    if (clockToggleBtn) {
      clockToggleBtn.addEventListener('click', () => {
        if (clockRunning) stopClock();
        else startClock();
      });
    }

    if (clockResetBtn) {
      clockResetBtn.addEventListener('click', () => {
        if (currentId) resetClock(currentId);
      });
    }

    ensureClockTicker();
    updateClockDisplay();
    updateClockControlsAccess();

    resetButton.addEventListener('click', () => {
      if (!isCommander()) return;
      resetDialog.style.display = 'flex';
    });

    commanderButton.addEventListener('click', () => {
      if (commanderMap[currentId] && !isCommander()) return;

      if (!commanderMap[currentId]) {
        if (!currentAssignSize) currentAssignSize = 6;
        startSession(currentId, userId);
      } else {
        resetSession(currentId);
      }
    });

    window.openChecklist = openChecklist;
    window.goHome = goHome;
    window.toggleCollapsible = toggleCollapsible;
    window.confirmReset = confirmReset;
    window.cancelReset = cancelReset;
    window.confirmResetAll = confirmResetAll;
    window.cancelResetAll = cancelResetAll;
    window.applyAssign = applyAssign;
    window.clearAssignAllForCurrent = clearAssignAllForCurrent;
    window.openPaperList = openPaperList;
    window.openUserGuide = openUserGuide;
  });
</script>
